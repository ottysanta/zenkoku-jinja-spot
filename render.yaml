# Render.com deployment config (Next.js + SQLite 対応)
# 使い方: Render ダッシュボードで New > Blueprint > このリポジトリを選択
services:
  - type: web
    name: zenkoku-jinja-spot
    env: node
    region: singapore
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_OPTIONS
        value: "--experimental-sqlite"
      - key: SHRINE_DB_URL
        value: https://github.com/ottysanta/zenkoku-jinja-spot/releases/download/v1.0/shrine_spots.db
      - key: PORT
        value: "3030"
    healthCheckPath: /
