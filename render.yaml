services:
  - type: web
    name: princess-pineapple-paws
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MOCK_MODE
        value: "false"
    disk:
      name: pineapple-db
      mountPath: /opt/render/project/src/data
      sizeGB: 1
