<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>⛩️ 全国神社スポット</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --vermilion: #b8373e;        /* 朱（しゅ）*/
      --vermilion-deep: #7a1f24;   /* 深朱 */
      --vermilion-light: #e8716f;  /* 薄朱 */
      --gold: #b8932c;             /* 金茶 */
      --gold-light: #e4c76a;
      --sumi: #1c1613;             /* 墨 */
      --ink: #2a1f1a;
      --ink-sub: #7a6a5e;
      --ink-mute: #a09184;
      --kinari: #f5efe2;           /* 生成り */
      --washi: #fbf7ec;            /* 和紙 */
      --paper: #ffffff;
      --border: #d9cfb8;
      --border-soft: #e8e0cc;
      --primary: var(--vermilion);
      --shadow-soft: 0 10px 28px rgba(28,22,19,.08);
      --shadow-lift: 0 16px 36px rgba(28,22,19,.12);
      --peek: 132px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    html { font-size: 17px; }
    @media (min-width: 768px) { html { font-size: 18px; } }
    html, body { height: 100%; font-family: 'Noto Sans JP', sans-serif; color: var(--ink); background: var(--washi); overflow: hidden; }

    /* MAP */
    #map { position: fixed; inset: 0; z-index: 0; background: #e8e0cc; }
    .leaflet-popup-content-wrapper {
      border-radius: 6px !important;
      border: 1.5px solid var(--vermilion) !important;
      font-family: 'Noto Sans JP', sans-serif !important;
      box-shadow: 0 6px 24px rgba(28,22,19,.18) !important;
    }
    .leaflet-popup-tip { border: 1.5px solid var(--vermilion) !important; }

    /* 青海波パターン（ヘッダー・ドロワー上部の装飾） */
    .seigaiha-bg {
      background-image:
        radial-gradient(circle at 50% 100%, transparent 18px, rgba(184,55,62,.08) 19px, rgba(184,55,62,.08) 20px, transparent 21px),
        radial-gradient(circle at 0% 100%, transparent 18px, rgba(184,55,62,.08) 19px, rgba(184,55,62,.08) 20px, transparent 21px),
        radial-gradient(circle at 100% 100%, transparent 18px, rgba(184,55,62,.08) 19px, rgba(184,55,62,.08) 20px, transparent 21px);
      background-size: 40px 20px;
      background-position: 0 0, 20px 10px, -20px 10px;
    }

    /* Shrine marker icon (torii gate) */
    .shrine-marker { background: transparent !important; border: none !important; }
    .shrine-marker .torii-wrap {
      position: relative;
      width: 38px; height: 44px;
      display: flex; align-items: flex-end; justify-content: center;
      filter: drop-shadow(0 3px 4px rgba(28,22,19,.35));
      transition: transform .18s;
    }
    .shrine-marker:hover .torii-wrap { transform: translateY(-3px) scale(1.08); }
    .shrine-marker .torii-svg { width: 34px; height: 38px; }
    .shrine-marker .torii-dot {
      position: absolute; bottom: -3px; left: 50%; transform: translateX(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--marker-color, #b8373e);
      border: 1.5px solid #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    /* HEADER */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; gap: 16px;
      padding: calc(14px + var(--safe-top)) 22px 16px; min-height: 84px;
      background: rgba(251,247,236,.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 22px rgba(28,22,19,.06);
    }
    #header::before {
      content: ''; position: absolute; left: 22px; right: 22px; bottom: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 18%, var(--gold) 82%, transparent 100%);
    }
    #header::after {
      display: none;
    }
    .logo-svg { width: 52px; height: 52px; flex-shrink: 0; }
    .header-title { flex: 1; min-width: 0; }
    #header h1 {
      font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
      font-size: 1.5rem; font-weight: 700; color: var(--sumi);
      line-height: 1.2; letter-spacing: .04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-sub {
      font-size: .7rem; font-weight: 600; letter-spacing: .22em;
      color: var(--ink-sub); margin-top: 5px;
      text-transform: uppercase;
    }
    .header-stamp {
      display: none;
    }
    .header-stamp span { display:block; }

    /* NEAR ME FAB */
    #near-me-btn {
      position: fixed; right: 20px; z-index: 810;
      bottom: calc(var(--peek) + 16px);
      width: 56px; height: 56px; border-radius: 50%;
      border: 1px solid rgba(184,55,62,.18);
      background: rgba(251,247,236,.94);
      color: var(--vermilion-deep); font-size: 1.35rem; cursor: pointer;
      box-shadow: var(--shadow-soft);
      display: flex; align-items: center; justify-content: center;
      transition: transform .18s, box-shadow .18s, background .18s, color .18s;
    }
    #near-me-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
    #near-me-btn:active { transform: scale(.94); }
    #near-me-btn.active {
      background: var(--vermilion); color: #fff; border-color: var(--vermilion-deep);
      box-shadow: 0 8px 22px rgba(184,55,62,.35);
    }
    #near-me-btn.locating::after {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid var(--vermilion); border-top-color: transparent;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* USER LOCATION MARKER */
    .user-location-marker { background: transparent !important; border: none !important; }
    .user-loc-wrap {
      position: relative; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    .user-loc-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: #1a73e8;
      border: 3px solid #fff;
      box-shadow: 0 0 0 1px rgba(26,115,232,.35), 0 2px 6px rgba(0,0,0,.3);
      position: relative; z-index: 2;
    }
    .user-loc-pulse {
      position: absolute; inset: -6px;
      border-radius: 50%; background: rgba(26,115,232,.28);
      animation: userPulse 2s ease-out infinite;
    }
    @keyframes userPulse {
      0%   { transform: scale(.6); opacity: .7; }
      100% { transform: scale(2.1); opacity: 0; }
    }

    /* ROUTE LINE tooltip */
    .route-dist-tip {
      background: var(--sumi); color: #fff;
      border: none !important; border-radius: 4px !important;
      padding: 5px 10px !important;
      font-family: 'Shippori Mincho', serif; font-weight: 700;
      font-size: .82rem; letter-spacing: .04em;
      box-shadow: 0 4px 12px rgba(0,0,0,.3) !important;
    }
    .route-dist-tip::before { display: none !important; }

    /* RADIUS PICKER */
    #radius-picker {
      display: none;
      position: fixed; right: 20px; z-index: 811;
      bottom: calc(var(--peek) + 82px);
      padding: 8px;
      background: rgba(251,247,236,.98);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow-lift);
      backdrop-filter: blur(10px);
      flex-direction: column; gap: 4px;
    }
    #radius-picker.on { display: flex; }
    .r-chip {
      padding: 8px 14px; min-width: 64px;
      border: 1px solid transparent; border-radius: 8px;
      background: transparent; color: var(--ink);
      font-family: 'Shippori Mincho', serif; font-size: .9rem; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: background .12s, color .12s, border-color .12s;
    }
    .r-chip:hover { background: rgba(184,55,62,.08); }
    .r-chip.active {
      background: var(--vermilion); color: #fff; border-color: var(--vermilion-deep);
    }

    /* NEW SHRINE FAB */
    #new-spot-btn {
      position: fixed; left: 20px; z-index: 810;
      bottom: calc(var(--peek) + 18px);
      padding: 0 18px; height: 48px; border-radius: 999px; border: 1px solid var(--border);
      background: rgba(251,247,236,.94);
      color: var(--sumi);
      font-family: 'Shippori Mincho', serif; font-weight: 700; font-size: .94rem;
      letter-spacing: .05em;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    #new-spot-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); border-color: rgba(184,55,62,.3); }
    #new-spot-btn::before { content: '＋ '; color: var(--vermilion); font-weight: 800; }

    /* TOAST */
    #toast {
      position: fixed; bottom: calc(var(--peek) + 26px); left: 50%;
      transform: translateX(-50%) translateY(10px);
      z-index: 1100; background: var(--sumi); color: #fff;
      padding: 13px 28px; border-radius: 3px;
      font-family: 'Shippori Mincho', serif; font-weight: 600;
      font-size: 1rem; letter-spacing: .08em;
      opacity: 0; transition: opacity .3s, transform .3s;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 24px rgba(28,22,19,.4);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== DRAWER ===== */
    #drawer {
      position: fixed; left: 0; right: 0; bottom: 0;
      height: 90vh; z-index: 800;
      background: var(--washi);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--border);
      box-shadow: 0 -12px 36px rgba(28,22,19,.12);
      transform: translateY(calc(90vh - var(--peek)));
      transition: transform .38s cubic-bezier(.32,.72,0,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #drawer::before {
      content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 16%, var(--gold) 84%, transparent 100%);
      border-radius: 22px 22px 0 0;
    }
    #drawer.dragging  { transition: none; }
    #drawer.snap-peek { transform: translateY(calc(90vh - var(--peek))); }
    #drawer.snap-half { transform: translateY(45vh); }
    #drawer.snap-full { transform: translateY(0); }

    #drawer-handle { flex-shrink: 0; padding: 14px 20px 16px; cursor: grab; user-select: none; touch-action: none; }
    .handle-bar {
      width: 48px; height: 4px;
      background: var(--border);
      border-radius: 2px; margin: 0 auto 12px; opacity: .7;
    }
    #drawer-peek-row { display: flex; align-items: center; gap: 10px; }
    #drawer-label {
      flex: 1; font-family: 'Shippori Mincho', serif;
      font-size: 1.08rem; font-weight: 700; color: var(--sumi);
      letter-spacing: .05em;
      display: flex; align-items: center;
    }
    #drawer-label::before { content: ''; display: inline-block; width: 3px; height: 18px; background: var(--gold); margin-right: 10px; }
    #drawer-count  {
      font-family: 'Shippori Mincho', serif;
      font-size: .96rem; font-weight: 700; color: var(--sumi);
      background: rgba(255,255,255,.72); padding: 6px 12px; border-radius: 999px;
      border: 1px solid var(--border-soft);
    }
    #drawer-count::after { content: '社'; font-size: .8rem; margin-left: 3px; color: var(--ink-sub); }
    #drawer-filter-btn {
      padding: 10px 16px; border: 1px solid var(--border); border-radius: 999px;
      background: rgba(255,255,255,.72); color: var(--sumi);
      font-family: 'Shippori Mincho', serif; font-size: .88rem; font-weight: 700;
      letter-spacing: .06em; cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    #drawer-filter-btn:hover { background: var(--paper); color: var(--vermilion-deep); border-color: rgba(184,55,62,.24); }

    /* Search area */
    #drawer-search { flex-shrink: 0; padding: 0 20px 16px; border-bottom: 1px solid var(--border-soft); background: linear-gradient(180deg, rgba(255,255,255,.56) 0%, rgba(251,247,236,.82) 100%); }
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap::before { content:"🔍"; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:.88rem; pointer-events:none; opacity:.7; }
    #search-input {
      width: 100%; padding: 14px 16px 14px 46px;
      border: 1px solid var(--border-soft); border-radius: 12px;
      font-family: 'Noto Sans JP',sans-serif; font-size: 1rem;
      color: var(--ink); background: var(--paper); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #search-input:focus { border-color: rgba(184,55,62,.24); box-shadow: 0 0 0 4px rgba(184,55,62,.08); }
    #search-input::placeholder { color: var(--ink-mute); }

    /* Type chips */
    #type-row { display: flex; gap: 12px; overflow-x: auto; padding: 2px 0 4px; }
    #type-row::-webkit-scrollbar { display: none; }
    .t-chip {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; gap: 8px; padding: 4px 0;
      min-width: 72px;
      cursor: pointer; transition: transform .15s;
    }
    .t-chip:hover { transform: translateY(-1px); }
    .t-chip.active .t-dot { border-color: var(--dot-color); box-shadow: 0 10px 18px rgba(28,22,19,.08); transform: translateY(-1px); }
    .t-chip.active .t-label { color: var(--vermilion-deep); font-weight: 800; }
    .t-dot {
      width: 42px; height: 42px; border-radius: 14px;
      border: 1px solid var(--border-soft); box-shadow: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; color: var(--dot-color);
      background: rgba(255,255,255,.88);
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .t-label {
      font-family: 'Shippori Mincho', serif;
      font-size: .74rem; font-weight: 700; color: var(--ink-sub);
      max-width: 68px; text-align: center; letter-spacing: .03em; line-height: 1.35;
    }

    /* Active filter bar */
    #filter-active {
      display: none; align-items: center; gap: 8px;
      margin-top: 12px; padding: 10px 14px;
      background: rgba(255,255,255,.72);
      border-radius: 12px; border: 1px solid rgba(184,55,62,.12);
    }
    #filter-active.on { display: flex; }
    #filter-active-text { flex:1; font-size:.78rem; font-weight:700; color: var(--vermilion-deep); letter-spacing: .04em; }
    #filter-clear { font-size:.76rem; color: var(--vermilion); background:none; border:none; cursor:pointer; font-family:'Shippori Mincho', serif; font-weight: 700; }

    /* ===== CARD LIST ===== */
    #card-list { flex: 1; overflow-y: auto; padding: 18px 20px calc(56px + var(--safe-bottom)); }
    #card-list::-webkit-scrollbar { width: 4px; }
    #card-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .s-card {
      position: relative;
      display: flex; gap: 0;
      background: var(--paper);
      border-radius: 14px; border: 1px solid rgba(217,207,184,.7);
      box-shadow: 0 8px 24px rgba(28,22,19,.05);
      margin-bottom: 16px; overflow: hidden; cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
    }
    .s-card::before {
      content: ''; position: absolute; top: 14px; left: 0; bottom: 14px; width: 3px;
      background: var(--card-accent, var(--vermilion));
    }
    .s-card:hover {
      box-shadow: 0 14px 30px rgba(28,22,19,.08);
      border-color: var(--card-accent, var(--vermilion));
      transform: translateY(-1px);
    }
    .s-card:active { transform: scale(.99); }
    .s-card-thumb {
      width: 84px; flex-shrink: 0; margin-left: 8px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      position: relative;
    }
    .s-card-thumb::after { display: none; }
    .s-card-thumb .torii-svg { width: 48px; height: 54px; position: relative; z-index: 1; }
    .s-card-body { flex:1; padding: 18px 18px 18px 12px; min-width:0; }
    .s-card-top { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; }
    .s-card-name {
      flex:1; font-family: 'Shippori Mincho', serif;
      font-size: 1.14rem; font-weight: 700; color: var(--sumi);
      line-height: 1.45; letter-spacing: .02em;
    }
    .s-card-dist {
      font-family: 'Shippori Mincho', serif;
      font-size:.82rem; font-weight:700; color: #fff; white-space:nowrap;
      padding:4px 11px; background: var(--vermilion); border: 1px solid var(--vermilion-deep);
      border-radius: 999px; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 4px;
      box-shadow: 0 2px 6px rgba(184,55,62,.25);
    }
    .s-card-dist::before { content: '📍'; font-size: .8rem; }
    .s-card-meta {
      font-size:.88rem; color:var(--ink-sub); margin-bottom:10px;
      display: flex; gap: 6px; align-items: center;
    }
    .s-card-meta .meta-sep { color: var(--border); }
    .s-card-tags { display:flex; flex-wrap:wrap; gap:8px; }
    .s-tag {
      display:inline-block; padding:5px 10px;
      font-size:.74rem; font-weight:600;
      background: rgba(245,239,226,.72); color: var(--ink-sub);
      border: 1px solid var(--border-soft);
      border-radius: 999px; letter-spacing: .03em;
    }
    .s-tag.type-tag { border-color: rgba(184,55,62,.18); color: var(--card-accent, var(--vermilion)); font-weight: 700; background: transparent; }
    .s-tag.goshuin { background: rgba(184,55,62,.08); border-color: rgba(184,55,62,.16); color: var(--vermilion-deep); font-weight: 700; }

    #card-empty { display:none; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--ink-sub); text-align:center; gap:14px; font-family:'Shippori Mincho', serif; }
    #card-empty.on { display:flex; }
    #card-empty .e-icon { font-size:3rem; opacity: .4; }

    /* ===== FILTER PANEL ===== */
    #fp-overlay { position:fixed; inset:0; z-index:1040; background:rgba(28,22,19,.3); opacity:0; pointer-events:none; transition:opacity .3s; backdrop-filter: blur(2px); }
    #fp-overlay.on { opacity:1; pointer-events:all; }
    #filter-panel {
      position:fixed; bottom:0; left:0; right:0; z-index:1050;
      background: var(--washi);
      border-top:1px solid var(--border); border-radius:22px 22px 0 0;
      padding:22px 22px calc(36px + var(--safe-bottom)); max-height:82vh; overflow-y:auto;
      transform:translateY(100%); transition:transform .38s cubic-bezier(.32,.72,0,1);
      box-shadow: 0 -14px 40px rgba(28,22,19,.14);
    }
    #filter-panel::before {
      content: ''; position: absolute; top: 0; left: 26px; right: 26px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 12%, var(--gold) 88%, transparent 100%);
      border-radius: 22px 22px 0 0;
    }
    #filter-panel.on { transform:translateY(0); }
    #filter-panel h2 {
      font-family:'Shippori Mincho', serif;
      font-size:1.4rem; font-weight:700; color:var(--sumi);
      margin-bottom:24px; letter-spacing: .08em;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    #filter-panel h2::before { content: ''; display: inline-block; width: 5px; height: 24px; background: var(--vermilion); }
    .f-section { margin-bottom:22px; }
    .f-label {
      font-family: 'Shippori Mincho', serif;
      font-size:.95rem; font-weight:700; color:var(--vermilion-deep);
      letter-spacing:.12em; margin-bottom:12px;
    }
    .chip-row { display:flex; flex-wrap:wrap; gap:9px; }
    .chip {
      padding:10px 16px; border-radius:999px; border:1px solid var(--border-soft);
      background:var(--paper); color:var(--ink-sub);
      font-family:'Noto Sans JP',sans-serif; font-size:.94rem; font-weight:500;
      cursor:pointer; transition: all .15s;
    }
    .chip:hover { border-color: var(--vermilion-light); color: var(--vermilion); }
    .chip.active {
      background: rgba(184,55,62,.08); border-color: rgba(184,55,62,.18); color:var(--vermilion-deep);
      font-weight: 700; box-shadow: none;
    }
    .f-actions { display:flex; gap:12px; margin-top:26px; padding-top: 20px; border-top: 1px solid var(--border-soft); }
    .btn-apply {
      flex:1; padding:17px;
      background: var(--vermilion);
      color:#fff; border:none; border-radius:5px;
      font-family:'Shippori Mincho',serif; font-size:1.12rem; font-weight:700;
      letter-spacing: .1em; cursor:pointer;
      box-shadow: 0 8px 18px rgba(122,31,36,.2);
      transition: transform .15s;
    }
    .btn-apply:hover { transform: translateY(-2px); }
    .btn-reset {
      padding:17px 24px; background: var(--paper); color:var(--sumi);
      border:1px solid var(--border-soft); border-radius:5px;
      font-family:'Shippori Mincho',serif; font-size:1.05rem; font-weight:600;
      letter-spacing: .08em; cursor:pointer;
    }
    .btn-reset:hover { border-color: var(--sumi); }

    /* ===== MODAL ===== */
    #modal-overlay { position:fixed; inset:0; z-index:2000; background:rgba(28,22,19,.45); display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .3s; backdrop-filter: blur(3px); }
    #modal-overlay.on { opacity:1; pointer-events:all; }
    #modal {
      width:100%; max-width:640px; margin:0 auto;
      background:var(--washi); border-radius:22px 22px 0 0;
      border-top:1px solid var(--border);

    }
    .t-btn:hover { color: var(--vermilion); }

    .i-row {

    /* ===== SUBMISSION MODAL ===== */

      display: flex; align-items: center; gap: 12px;

    .close-x:hover { color: var(--vermilion); }

<body>
  <div id="map"></div>

  <header id="header">
    <svg class="logo-svg" viewBox="0 0 48 48" aria-hidden="true">
      <!-- 鳥居 -->
      <rect x="6" y="10" width="36" height="5" fill="#7a1f24"/>
      <rect x="4" y="15" width="40" height="3" fill="#b8373e"/>
      <rect x="9" y="18" width="4" height="26" fill="#b8373e"/>
      <rect x="35" y="18" width="4" height="26" fill="#b8373e"/>
      <rect x="13" y="23" width="22" height="3" fill="#b8373e"/>
      <rect x="22" y="26" width="4" height="18" fill="#b8373e"/>
    </svg>
    <div class="header-title">
      <h1>全国神社スポット</h1>
      <div class="header-sub">Shrine Map of Japan</div>
    </div>
    <div class="header-stamp"><span>神社</span></div>
  </header>

  <button id="near-me-btn" title="現在地から探す">📍</button>
  <div id="radius-picker" role="group" aria-label="検索半径">
    <button class="r-chip" data-radius="1000">1km</button>
    <button class="r-chip" data-radius="3000">3km</button>
    <button class="r-chip active" data-radius="5000">5km</button>
    <button class="r-chip" data-radius="10000">10km</button>
    <button class="r-chip" data-radius="30000">30km</button>
  </div>
  <button id="new-spot-btn">神社を申請</button>

  <div id="toast"></div>

  <!-- DRAWER -->
  <div id="drawer" class="snap-peek">
    <div id="drawer-handle">
      <div class="handle-bar"></div>
      <div id="drawer-peek-row">
        <div id="drawer-label">神社リスト</div>
        <div id="drawer-count">0</div>
        <button id="drawer-filter-btn">フィルタ</button>
      </div>
    </div>
    <div id="drawer-search">
      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="神社名・祭神・地域で検索" />
      </div>
      <div id="type-row"></div>
      <div id="filter-active">
        <span id="filter-active-text"></span>
        <button id="filter-clear">クリア</button>
      </div>
    </div>
    <div id="card-list"></div>
    <div id="card-empty"><div class="e-icon">⛩️</div><div>条件に合う神社がありません</div></div>
  </div>

  <!-- FILTER PANEL -->
  <div id="fp-overlay"></div>
  <aside id="filter-panel">
    <h2>🔍 絞り込み</h2>
    <div class="f-section">
      <div class="f-label">都道府県</div>
      <div class="chip-row" id="f-prefectures"></div>
    </div>
    <div class="f-section">
      <div class="f-label">神社タイプ</div>
      <div class="chip-row" id="f-types"></div>
    </div>
    <div class="f-section">
      <div class="f-label">ご利益</div>
      <div class="chip-row" id="f-benefits"></div>
    </div>
    <div class="f-section">
      <div class="f-label">社格</div>
      <div class="chip-row" id="f-ranks"></div>
    </div>
    <div class="f-section">
      <div class="f-label">御朱印</div>
      <div class="chip-row" id="f-goshuin">
        <button class="chip" data-goshuin="true">御朱印あり</button>
      </div>
    </div>
    <div class="f-actions">
      <button class="btn-reset" id="btn-reset">リセット</button>
      <button class="btn-apply" id="btn-apply">適用</button>
    </div>

  <!-- MODAL -->
  <div id="modal-overlay">
    <div id="modal">
      <div class="m-header">
        <div class="m-drag"></div>
        <div class="m-name" id="m-name"></div>

      <div class="m-tabs">
        <button class="t-btn active" data-tab="info">神社情報</button>
        <button class="t-btn" data-tab="posts">参拝記録</button>
      </div>
      <div class="modal-scroll">
        <div class="t-pane active" id="pane-info"></div>
        <div class="t-pane" id="pane-posts"></div>
      </div>
      <div id="modal-footer">
        <button id="go-btn" class="go-btn" type="button">🗺️ この神社を地図で見る</button>

  <!-- SUBMISSION MODAL -->
  <div id="submit-overlay">
    <div id="submit-panel" style="position:relative;">
      <button class="close-x" id="submit-close">×</button>
      <h2>⛩️ 神社を申請</h2>
      <form id="submit-form">
        <label class="post-field-lbl">神社名 <span style="color:var(--primary)">*</span></label>
        <input class="post-input" name="name" required />
        <label class="post-field-lbl">住所</label>
        <input class="post-input" name="address" />
        <label class="post-field-lbl">神社タイプ</label>
        <input class="post-input" name="shrine_type" placeholder="稲荷／八幡／天神 など" />
        <label class="post-field-lbl">説明・祭神・ご利益</label>
        <textarea class="post-input" name="description" rows="3"></textarea>
        <label class="post-field-lbl">投稿者名</label>
        <input class="post-input" name="nickname" placeholder="省略可" />
        <button type="submit" class="post-submit-btn">申請する</button>
        <div class="post-disclaimer">※ 申請は審査後に公開されます</div>
      </form>
    </div>
  </div>

  <script>
    // ========== CONFIG ==========
    const CHECKIN_MAX_DISTANCE_M = 300;   // サーバー側とUI表示を一致させる
    const CHECKIN_MIN_ACCURACY_M = 200;
    const WISH_LABELS = {
      gratitude: '感謝', vow: '決意', milestone: '節目', thanks: 'お礼', other: 'その他',
    };

    // 認証導入前の匿名ID（localStorage）
    function getClientId() {
      try {
        let id = localStorage.getItem('ssp_client_id');
        if (!id) {
          id = 'c_' + (crypto?.randomUUID?.() || (Date.now().toString(36) + Math.random().toString(36).slice(2)));
          localStorage.setItem('ssp_client_id', id);
        }
        return id;
      } catch { return 'c_' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
    }

    const TYPE_COLOR = {
      '稲荷': '#FF6B35', '八幡': '#C3342F', '天神': '#1B5E9A',
      '熊野': '#2E7D32', '諏訪': '#5B3A91', '神宮': '#C9A227',
      '大社': '#8B4513', 'その他': '#6B7280'
    };
    const TYPE_EMOJI = {
      '稲荷': '🦊', '八幡': '🏹', '天神': '✏️',
      '熊野': '🌲', '諏訪': '🏔️', '神宮': '⛩️',
      '大社': '⛩️', 'その他': '⛩️'
    };

    // ========== STATE ==========
    const state = {
      spots: [],
      facets: { prefectures: [], shrine_types: [], benefits: [], ranks: [] },
      filters: { prefecture: null, shrine_type: null, benefit: null, rank: null, goshuin: null, search: '' },
      markers: [],
      userLocation: null,      // {lat, lng, accuracy}
      searchRadius: 5000,      // meters (有効なのは userLocation がある時のみ)
      nearbyActive: false,     // 現在地フィルタ ON/OFF
      userMarker: null,
      accuracyCircle: null,
      routeLine: null,
      routeTip: null,
      watchId: null,
    };

    // ========== GEO HELPERS ==========
    function haversineM(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }
    function formatDist(m) {
      if (m == null) return '';
      if (m < 1000) return `${Math.round(m)}m`;
      if (m < 10000) return `${(m/1000).toFixed(1)}km`;
      return `${Math.round(m/1000)}km`;
    }

    // ========== MAP ==========
    const map = L.map('map', { zoomControl: false }).setView([36.2, 138.2], 6);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 19,
    }).addTo(map);
    // 地図の余白タップで「現在地→神社」の直線ルートを消す
    map.on('click', () => {
      if (state.routeLine) { map.removeLayer(state.routeLine); state.routeLine = null; }
      if (state.routeTip)  { map.removeLayer(state.routeTip);  state.routeTip = null;  }
    });

    function toast(msg, ms = 2200) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove('show'), ms);
    }

    function toriiSvg(color) {
      // 鳥居SVG（マーカー/カード共通）
      return `<svg class="torii-svg" viewBox="0 0 40 44" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="6" width="30" height="4" fill="${shade(color, -0.25)}"/>
        <rect x="3" y="10" width="34" height="3" fill="${color}"/>
        <rect x="7" y="13" width="3" height="28" fill="${color}"/>
        <rect x="30" y="13" width="3" height="28" fill="${color}"/>
        <rect x="10" y="18" width="20" height="2.5" fill="${color}"/>
        <rect x="18.5" y="20.5" width="3" height="20.5" fill="${color}"/>
      </svg>`;
    }
    function shade(hex, amt) {
      // -1..1 darken/lighten
      const h = hex.replace('#','');
      const n = parseInt(h, 16);
      let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      const f = amt < 0 ? 1 + amt : 1 - amt;
      const t = amt < 0 ? 0 : 255;
      r = Math.round(r * f + t * (1-f));
      g = Math.round(g * f + t * (1-f));
      b = Math.round(b * f + t * (1-f));
      return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
    }
    function makeIcon(type) {
      const color = TYPE_COLOR[type] || TYPE_COLOR['その他'];
      return L.divIcon({
        className: 'shrine-marker',
        html: `<div class="torii-wrap" style="--marker-color:${color}">${toriiSvg(color)}<div class="torii-dot"></div></div>`,
        iconSize: [38, 44], iconAnchor: [19, 44],
        popupAnchor: [0, -40],
      });
    }

    function parseBenefits(b) {
      if (!b) return [];
      try { const a = JSON.parse(b); return Array.isArray(a) ? a : []; } catch { return []; }
    }

    // ========== DATA LOAD ==========
    async function loadSpots() {
      const res = await fetch('/spots');
      state.spots = await res.json();
      renderMarkers();
      renderList();
    }
    async function loadFacets() {
      const res = await fetch('/shrine-facets');
      state.facets = await res.json();
      renderTypeChips();
      renderFilterPanel();
    }

    function renderMarkers() {
      state.markers.forEach(m => map.removeLayer(m));
      state.markers = [];
      const filtered = filterSpots();
      filtered.forEach(s => {
        const m = L.marker([s.lat, s.lng], { icon: makeIcon(s.shrine_type) });
        m.bindPopup(`<b>${escapeHtml(s.name)}</b><br><span style="color:#6b5c52;font-size:.8rem">${escapeHtml(s.shrine_type || '')}</span>`);
        m.on('click', () => openModal(s));
        m.addTo(map);
        state.markers.push(m);
      });
    }

    function filterSpots() {
      const { prefecture, shrine_type, benefit, rank, goshuin, search } = state.filters;
      const q = (search || '').trim().toLowerCase();
      const ul = state.userLocation;
      const radiusOn = state.nearbyActive && ul;

      const result = [];
      for (const s of state.spots) {
        if (prefecture && s.prefecture !== prefecture) continue;
        if (shrine_type && s.shrine_type !== shrine_type) continue;
        if (rank && s.shrine_rank !== rank) continue;
        if (goshuin === true && s.goshuin_available !== true) continue;
        if (benefit) {
          const arr = parseBenefits(s.benefits);
          if (!arr.some(b => b.includes(benefit))) continue;
        }
        if (q) {
          const hay = [s.name, s.address, s.deity, s.prefecture, s.shrine_type].filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) continue;
        }
        let dist = null;
        if (ul) dist = haversineM(ul.lat, ul.lng, s.lat, s.lng);
        if (radiusOn && dist > state.searchRadius) continue;
        result.push({ ...s, _dist: dist });
      }
      // 距離が分かるときは距離昇順、そうでなければそのまま
      if (ul) result.sort((a, b) => (a._dist ?? Infinity) - (b._dist ?? Infinity));
      return result;
    }

    function renderList() {
      const list = document.getElementById('card-list');
      const empty = document.getElementById('card-empty');
      const filtered = filterSpots();
      document.getElementById('drawer-count').textContent = filtered.length;
      if (filtered.length === 0) { list.innerHTML = ''; empty.classList.add('on'); return; }
      empty.classList.remove('on');
      list.innerHTML = filtered.map(s => {
        const color = TYPE_COLOR[s.shrine_type] || TYPE_COLOR['その他'];
        const benefits = parseBenefits(s.benefits).slice(0, 3);
        const goshuinTag = s.goshuin_available === true ? `<span class="s-tag goshuin">御朱印</span>` : '';
        const typeTag = s.shrine_type ? `<span class="s-tag type-tag">${escapeHtml(s.shrine_type)}</span>` : '';
        const benefitTags = benefits.map(b => `<span class="s-tag">${escapeHtml(b)}</span>`).join('');
        const metaParts = [];
        if (s.prefecture) metaParts.push(escapeHtml(s.prefecture));
        if (s.deity) metaParts.push(escapeHtml(s.deity.split(/[,、]/)[0]));
        const meta = metaParts.join('<span class="meta-sep"> ／ </span>');
        const distBadge = s._dist != null ? `<div class="s-card-dist">${formatDist(s._dist)}</div>` : '';
        return `
          <div class="s-card" data-id="${s.id}" style="--card-accent:${color}">
            <div class="s-card-thumb">${toriiSvg(color)}</div>
            <div class="s-card-body">
              <div class="s-card-top">
                <div class="s-card-name">${escapeHtml(s.name)}</div>
                ${distBadge}
              </div>
              <div class="s-card-meta">${meta}</div>
              <div class="s-card-tags">${typeTag}${goshuinTag}${benefitTags}</div>
            </div>
          </div>`;
      }).join('');
      list.querySelectorAll('.s-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = Number(card.dataset.id);
          const s = state.spots.find(x => x.id === id);
          if (s) openModal(s);
        });
      });
    }

    function renderTypeChips() {
      const row = document.getElementById('type-row');
      const types = ['神宮','大社','稲荷','八幡','天神','熊野','諏訪','その他'];
      row.innerHTML = types.map(t => {
        const color = TYPE_COLOR[t];
        const emoji = TYPE_EMOJI[t];
        const active = state.filters.shrine_type === t ? 'active' : '';
        return `<div class="t-chip ${active}" data-type="${t}" style="--dot-color:${color}">
          <div class="t-dot">${emoji}</div>
          <div class="t-label">${t}</div>
        </div>`;
      }).join('');
      row.querySelectorAll('.t-chip').forEach(el => {
        el.addEventListener('click', () => {
          const t = el.dataset.type;
          state.filters.shrine_type = state.filters.shrine_type === t ? null : t;
          renderTypeChips(); renderList(); renderMarkers(); updateActiveBar();
        });
      });
    }

    function renderFilterPanel() {
      const mkChips = (arr, key) => arr.map(v =>
        `<button class="chip ${state.filters[key]===v?'active':''}" data-value="${escapeAttr(v)}">${escapeHtml(v)}</button>`
      ).join('');
      document.getElementById('f-prefectures').innerHTML = mkChips(state.facets.prefectures, 'prefecture');
      document.getElementById('f-types').innerHTML = mkChips(state.facets.shrine_types, 'shrine_type');
      document.getElementById('f-benefits').innerHTML = mkChips(state.facets.benefits, 'benefit');
      document.getElementById('f-ranks').innerHTML = mkChips(state.facets.ranks, 'rank');

      const bindChips = (containerId, key) => {
        document.getElementById(containerId).querySelectorAll('.chip').forEach(el => {
          el.addEventListener('click', () => {
            const v = el.dataset.value;
            state.filters[key] = state.filters[key] === v ? null : v;
            renderFilterPanel();
          });
        });
      };
      bindChips('f-prefectures', 'prefecture');
      bindChips('f-types', 'shrine_type');
      bindChips('f-benefits', 'benefit');
      bindChips('f-ranks', 'rank');

      const gRow = document.getElementById('f-goshuin');
      gRow.querySelector('[data-goshuin]').classList.toggle('active', state.filters.goshuin === true);
      gRow.querySelector('[data-goshuin]').onclick = () => {
        state.filters.goshuin = state.filters.goshuin === true ? null : true;
        renderFilterPanel();
      };
    }

    function updateActiveBar() {
      const bar = document.getElementById('filter-active');
      const parts = [];
      if (state.nearbyActive && state.userLocation) parts.push(`現在地から ${formatDist(state.searchRadius)} 以内`);
      if (state.filters.prefecture) parts.push(state.filters.prefecture);
      if (state.filters.shrine_type) parts.push(state.filters.shrine_type);
      if (state.filters.benefit) parts.push(state.filters.benefit);
      if (state.filters.rank) parts.push(state.filters.rank);
      if (state.filters.goshuin === true) parts.push('御朱印あり');
      if (parts.length) {
        document.getElementById('filter-active-text').textContent = parts.join(' · ');
        bar.classList.add('on');
      } else {
        bar.classList.remove('on');
      }
    }

    // ========== MODAL ==========
    async function openModal(s) {
      document.getElementById('m-name').textContent = s.name;
      document.getElementById('m-addr').textContent = s.address || '';
      const badge = document.getElementById('m-type-badge-wrap');
      if (s.shrine_type) {
        const color = TYPE_COLOR[s.shrine_type] || TYPE_COLOR['その他'];
        badge.innerHTML = `<span class="m-type-badge" style="--badge-color:${color}">${escapeHtml(s.shrine_type)}</span>`;
      } else {
        badge.innerHTML = '';
      }
      // Info pane
      const pane = document.getElementById('pane-info');
      const benefits = parseBenefits(s.benefits);
      const benefitHtml = benefits.length ? benefits.map(b => `<span class="benefit-tag">${escapeHtml(b)}</span>`).join('') : '—';
      const distFromMe = state.userLocation
        ? haversineM(state.userLocation.lat, state.userLocation.lng, s.lat, s.lng)
        : null;
      const rows = [
        distFromMe != null && { icon:'📍', lbl:'現在地から', val: `約 ${formatDist(distFromMe)}（直線距離）` },
        s.deity && { icon:'🙏', lbl:'祭神', val: escapeHtml(s.deity) },
        benefits.length && { icon:'🌸', lbl:'ご利益', val: benefitHtml, raw:true },
        s.shrine_rank && { icon:'🎖️', lbl:'社格', val: escapeHtml(s.shrine_rank) },
        s.founded && { icon:'📜', lbl:'創建', val: escapeHtml(s.founded) },
        (s.goshuin_available !== null && s.goshuin_available !== undefined) && { icon:'📖', lbl:'御朱印', val: (s.goshuin_available ? 'あり' : 'なし') + (s.goshuin_info ? '<br>' + escapeHtml(s.goshuin_info) : ''), raw:true },
        s.juyohin_info && { icon:'🎴', lbl:'授与品', val: escapeHtml(s.juyohin_info) },
        s.access_info && { icon:'🚃', lbl:'アクセス', val: escapeHtml(s.access_info) },
        s.website && { icon:'🌐', lbl:'公式サイト', val: `<a href="${escapeAttr(s.website)}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline">${escapeHtml(s.website)}</a>`, raw:true },
        s.source_url && { icon:'🔗', lbl:'ソース', val: `<a href="${escapeAttr(s.source_url)}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline">参考リンク</a>`, raw:true },
      ].filter(Boolean);
      pane.innerHTML = rows.map(r => `
        <div class="i-row">
          <div class="i-icon">${r.icon}</div>
          <div class="i-body">
            <div class="i-lbl">${r.lbl}</div>
            <div class="i-val">${r.raw ? r.val : escapeHtml(r.val)}</div>
          </div>
        </div>
      `).join('');

      // Go button — 外部には飛ばさず、アプリ内の地図でその神社にフォーカスする
      const go = document.getElementById('go-btn');
      go.dataset.spotId = s.id;
      go.textContent = state.userLocation ? '🗺️ この神社までの距離を地図で見る' : '🗺️ この神社を地図で見る';

      // Tabs
      document.querySelectorAll('.t-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'info'));
      document.querySelectorAll('.t-pane').forEach(p => p.classList.remove('active'));
      document.getElementById('pane-info').classList.add('active');

      // Posts pane (lazy) — 参拝チェックインも内包
      state.currentSpot = s;
      loadPosts(s.id);

      document.getElementById('modal-overlay').classList.add('on');
    }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('on'); }

    async function loadPosts(spotId) {
      const pane = document.getElementById('pane-posts');
      pane.innerHTML = '<div class="no-posts">読み込み中...</div>';
      try {
        const [postsRes, ciListRes, ciStatsRes] = await Promise.all([
          fetch(`/spots/${spotId}/posts`),
          fetch(`/spots/${spotId}/checkins?limit=10`),
          fetch(`/spots/${spotId}/checkin-stats`),
        ]);
        const posts = await postsRes.json();
        const checkins = ciListRes.ok ? await ciListRes.json() : [];
        const stats = ciStatsRes.ok ? await ciStatsRes.json() : { total: 0, month: 0, unique_visitors: 0 };

        const checkinSectionHtml = renderCheckinSection(spotId, checkins, stats);

        const listHtml = posts.length
          ? posts.map(p => `
              <div class="user-post">
                ${p.image_path ? `<div class="up-img-wrap"><img class="up-img" src="${escapeAttr(p.image_path)}" /></div>` : ''}
                ${p.description ? `<div class="up-comment">${escapeHtml(p.description)}</div>` : ''}
                <div class="up-meta">
                  <span class="up-nick">${escapeHtml(p.nickname || '匿名さん')}</span>
                  <span>${escapeHtml((p.created_at || '').slice(0,10))}</span>
                </div>
              </div>`).join('')
          : '<div class="no-posts">まだ写真付きの参拝記録がありません</div>';
        pane.innerHTML = checkinSectionHtml + listHtml + `
          <div class="post-form">
            <div class="post-form-ttl">📝 参拝記録を投稿</div>
            <label class="post-field-lbl">写真</label>
            <label class="post-file-btn" for="post-file">📷 画像を選択</label>
            <input id="post-file" type="file" accept="image/*" />
            <img id="post-preview" />
            <label class="post-field-lbl">コメント</label>
            <textarea class="post-input" id="post-comment" rows="3" placeholder="参拝の感想など"></textarea>
            <label class="post-field-lbl">お名前</label>
            <input class="post-input" id="post-nickname" placeholder="省略可（匿名さん）" />
            <button class="post-submit-btn" id="post-submit-btn" disabled>投稿する</button>
            <div class="post-disclaimer">※ 投稿内容は公開されます</div>
          </div>`;
        const fileInput = document.getElementById('post-file');
        const preview = document.getElementById('post-preview');
        const submitBtn = document.getElementById('post-submit-btn');
        fileInput.addEventListener('change', () => {
          const f = fileInput.files[0];
          if (f) {
            preview.src = URL.createObjectURL(f); preview.style.display = 'block';
            submitBtn.disabled = false;
          } else { preview.style.display = 'none'; submitBtn.disabled = true; }
        });
        submitBtn.addEventListener('click', async () => {
          const f = fileInput.files[0];
          if (!f) return;
          const fd = new FormData();
          fd.append('file', f);
          fd.append('comment', document.getElementById('post-comment').value);
          fd.append('nickname', document.getElementById('post-nickname').value);
          submitBtn.disabled = true;
          try {
            const r = await fetch(`/spots/${spotId}/posts`, { method: 'POST', body: fd });
            if (!r.ok) throw new Error('failed');
            toast('投稿しました');
            loadPosts(spotId);
          } catch (e) { toast('投稿に失敗しました'); submitBtn.disabled = false; }
        });

        // 参拝チェックインの動作バインド
        bindCheckinSection(spotId);
      } catch (e) { pane.innerHTML = '<div class="no-posts">読み込みに失敗しました</div>'; }
    }

    // ===== 参拝チェックイン =====
    function renderCheckinSection(spotId, checkins, stats) {
      const listHtml = checkins.length
        ? checkins.map(c => {
            const wish = c.wish_type ? `<span class="ci-wish-badge">${escapeHtml(WISH_LABELS[c.wish_type] || c.wish_type)}</span>` : '';
            const name = escapeHtml(c.nickname || '参拝者');
            const cmt  = c.comment ? `<span class="ci-item-comment">${escapeHtml(c.comment)}</span>` : `<span class="ci-item-comment" style="color:var(--ink-mute)">参拝を記録しました</span>`;
            const time = formatRelativeTime(c.created_at);
            return `<div class="ci-item">${wish}<span class="ci-item-name">${name}</span>${cmt}<span class="ci-item-time">${escapeHtml(time)}</span></div>`;
          }).join('')
        : '';

      return `
        <div class="checkin-section" data-spot="${spotId}">
          <div class="ci-head">
            <div class="ci-title">🙏 参拝チェックイン</div>
            <div class="ci-stats">累計 ${stats.total} · 今月 ${stats.month}</div>
          </div>
          <div class="ci-status" id="ci-status">現在地を確認しています…</div>
          <button class="ci-btn" id="ci-btn" disabled>参拝を記録する</button>
          <div class="ci-form" id="ci-form">
            <div style="font-size:.82rem;color:var(--ink-sub);margin-bottom:8px;letter-spacing:.06em;">きょうの参拝は？（任意）</div>
            <div class="ci-wish-row" id="ci-wish-row">
              ${Object.entries(WISH_LABELS).map(([k,v]) => `<button class="ci-wish" data-wish="${k}">${v}</button>`).join('')}
            </div>
            <textarea class="post-input" id="ci-comment" rows="2" placeholder="短い一言（任意・280文字まで）" maxlength="280"></textarea>
            <input class="post-input" id="ci-nickname" placeholder="お名前（任意・匿名可）" style="margin-top:8px;" maxlength="30" />
          </div>
          ${listHtml ? `<div class="ci-list">${listHtml}</div>` : ''}
        </div>
      `;
    }

    function bindCheckinSection(spotId) {
      const section = document.querySelector('.checkin-section');
      if (!section) return;
      const statusEl = document.getElementById('ci-status');
      const btn = document.getElementById('ci-btn');
      const form = document.getElementById('ci-form');
      const wishRow = document.getElementById('ci-wish-row');
      let selectedWish = null;

      // 願い選択
      wishRow.querySelectorAll('.ci-wish').forEach(el => {
        el.addEventListener('click', () => {
          const w = el.dataset.wish;
          if (selectedWish === w) {
            selectedWish = null;
            el.classList.remove('active');
          } else {
            selectedWish = w;
            wishRow.querySelectorAll('.ci-wish').forEach(x => x.classList.toggle('active', x === el));
          }
        });
      });

      // 現在地確認と距離判定
      const spot = state.currentSpot;
      function evaluateProximity() {
        if (!spot) return;
        const ul = state.userLocation;
        if (!ul) {
          statusEl.textContent = '📍 現在地が未取得です。右下の現在地ボタンから取得してください。';
          statusEl.className = 'ci-status warn';
          btn.disabled = true;
          btn.textContent = '現在地を取得してください';
          return;
        }
        const dist = haversineM(ul.lat, ul.lng, spot.lat, spot.lng);
        const acc = ul.accuracy || 0;
        if (acc > CHECKIN_MIN_ACCURACY_M) {
          statusEl.textContent = `📡 GPS精度が粗いため受け付けできません（±${Math.round(acc)}m）。空が見える場所でもう一度取得してください。`;
          statusEl.className = 'ci-status warn';
          btn.disabled = true;
          btn.textContent = 'GPS精度が不十分です';
          return;
        }
        if (dist <= CHECKIN_MAX_DISTANCE_M) {
          statusEl.textContent = `✨ 境内にいらっしゃるようです（約 ${formatDist(dist)}）。心を込めて記録できます。`;
          statusEl.className = 'ci-status ok';
          btn.disabled = false;
          btn.textContent = '参拝を記録する';
          form.classList.add('on');
        } else {
          statusEl.textContent = `🚶 神社まで あと約 ${formatDist(dist - CHECKIN_MAX_DISTANCE_M)}（現在 ${formatDist(dist)}）。境内に近づくと記録できます。`;
          statusEl.className = 'ci-status warn';
          btn.disabled = true;
          btn.textContent = 'もう少し近づいてください';
          form.classList.remove('on');
        }
      }
      evaluateProximity();

      // すでに位置情報の利用を許可済みの時のみ、静かに自動取得
      // （初回訪問でいきなり許可ダイアログを出さない）
      if (!state.userLocation && navigator.geolocation && navigator.permissions) {
        navigator.permissions.query({ name: 'geolocation' }).then(p => {
          if (p.state === 'granted') {
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                state.userLocation = {
                  lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy,
                };
                drawUserMarker();
                evaluateProximity();
              },
              () => {},
              { enableHighAccuracy: true, timeout: 10000, maximumAge: 20000 }
            );
          }
        }).catch(() => {});
      }

      btn.addEventListener('click', async () => {
        if (btn.disabled) return;
        const ul = state.userLocation;
        if (!ul) { toast('現在地が取得できていません'); return; }
        btn.disabled = true;
        btn.textContent = '記録中…';
        try {
          const res = await fetch(`/spots/${spotId}/checkins`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              client_id: getClientId(),
              lat: ul.lat, lng: ul.lng,
              accuracy_m: ul.accuracy || null,
              wish_type: selectedWish,
              comment: document.getElementById('ci-comment').value || null,
              nickname: document.getElementById('ci-nickname').value || null,
            }),
          });
          if (res.status === 409) {
            const body = await res.json().catch(() => ({}));
            toast(body.detail || '本日は既に記録済みです');
            btn.textContent = '本日は記録済み';
            return;
          }
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.detail || '記録に失敗しました');
          }
          toast('🙏 参拝を記録しました');
          loadPosts(spotId);
        } catch (e) {
          toast(e.message || '記録に失敗しました');
          btn.disabled = false;
          btn.textContent = '参拝を記録する';
        }
      });
    }

    function formatRelativeTime(iso) {
      if (!iso) return '';
      const t = new Date(iso).getTime();
      if (isNaN(t)) return (iso || '').slice(0, 10);
      const diff = (Date.now() - t) / 1000;
      if (diff < 60) return 'たった今';
      if (diff < 3600) return `${Math.floor(diff/60)}分前`;
      if (diff < 86400) return `${Math.floor(diff/3600)}時間前`;
      if (diff < 86400 * 7) return `${Math.floor(diff/86400)}日前`;
      return iso.slice(0, 10);
    }

    // ========== DRAWER DRAG ==========
    (function drawer(){
      const el = document.getElementById('drawer');
      const handle = document.getElementById('drawer-handle');
      let startY = null, startOffset = 0;
      const snap = (cls) => { el.classList.remove('snap-peek','snap-half','snap-full'); el.classList.add(cls); };
      handle.addEventListener('pointerdown', (e) => { startY = e.clientY; el.classList.add('dragging'); handle.setPointerCapture(e.pointerId); });
      handle.addEventListener('pointermove', (e) => {
        if (startY == null) return;
        const dy = e.clientY - startY;
        el.style.transform = `translateY(calc(var(--off, 0px) + ${dy}px))`;
      });
      handle.addEventListener('pointerup', (e) => {
        if (startY == null) return;
        const dy = e.clientY - startY;
        el.classList.remove('dragging'); el.style.transform = '';
        startY = null;
        if (dy < -120) snap('snap-full');
        else if (dy < -40) snap('snap-half');
        else if (dy > 40) snap('snap-peek');
      });
      // Click handle row to toggle
      document.getElementById('drawer-peek-row').addEventListener('click', (e) => {
        if (e.target.closest('#drawer-filter-btn')) return;
        if (el.classList.contains('snap-peek')) snap('snap-half');
        else if (el.classList.contains('snap-half')) snap('snap-full');
        else snap('snap-peek');
      });
    })();

    // ========== EVENTS ==========
    document.getElementById('search-input').addEventListener('input', (e) => {
      state.filters.search = e.target.value;
      renderList();
    });
    document.getElementById('drawer-filter-btn').addEventListener('click', () => {
      document.getElementById('filter-panel').classList.add('on');
      document.getElementById('fp-overlay').classList.add('on');
    });
    document.getElementById('fp-overlay').addEventListener('click', () => {
      document.getElementById('filter-panel').classList.remove('on');
      document.getElementById('fp-overlay').classList.remove('on');
    });
    document.getElementById('btn-apply').addEventListener('click', () => {
      document.getElementById('filter-panel').classList.remove('on');
      document.getElementById('fp-overlay').classList.remove('on');
      renderTypeChips(); renderList(); renderMarkers(); updateActiveBar();
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      state.filters = { prefecture:null, shrine_type:null, benefit:null, rank:null, goshuin:null, search: state.filters.search };
      renderFilterPanel();
    });
    document.getElementById('filter-clear').addEventListener('click', () => {
      state.filters = { prefecture:null, shrine_type:null, benefit:null, rank:null, goshuin:null, search: state.filters.search };
      // 現在地検索も解除
      disableNearby();
      renderFilterPanel(); renderTypeChips(); renderList(); renderMarkers(); updateActiveBar();
    });

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'modal-overlay') closeModal();
    });

    // 「地図で見る」— モーダルを閉じて地図でその神社にフォーカス、現在地があれば直線ルート線を表示
    document.getElementById('go-btn').addEventListener('click', () => {
      const id = Number(document.getElementById('go-btn').dataset.spotId);
      const s = state.spots.find(x => x.id === id);
      if (!s) return;
      closeModal();
      // ドロワーを下げて地図を見やすく
      const dr = document.getElementById('drawer');
      dr.classList.remove('snap-half','snap-full'); dr.classList.add('snap-peek');
      const target = [s.lat, s.lng];
      if (state.userLocation) {
        drawRouteTo(s);
        const bounds = [[state.userLocation.lat, state.userLocation.lng], target];
        map.fitBounds(bounds, { padding: [80, 80], maxZoom: 15 });
      } else {
        map.setView(target, 16);
      }
      // 対応するマーカーのポップアップを開く
      const m = state.markers.find(mk => {
        const ll = mk.getLatLng();
        return Math.abs(ll.lat - s.lat) < 1e-6 && Math.abs(ll.lng - s.lng) < 1e-6;
      });
      if (m) setTimeout(() => m.openPopup(), 250);
    });
    document.querySelectorAll('.t-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.toggle('active', b === btn));
        document.querySelectorAll('.t-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + tab));
      });
    });

    // ========== NEAR ME / LOCATION ==========
    const nearMeBtn = document.getElementById('near-me-btn');
    const radiusPicker = document.getElementById('radius-picker');

    function drawUserMarker() {
      if (!state.userLocation) return;
      const { lat, lng, accuracy } = state.userLocation;
      if (state.userMarker) { map.removeLayer(state.userMarker); state.userMarker = null; }
      if (state.accuracyCircle) { map.removeLayer(state.accuracyCircle); state.accuracyCircle = null; }

      const icon = L.divIcon({
        className: 'user-location-marker',
        html: '<div class="user-loc-wrap"><div class="user-loc-pulse"></div><div class="user-loc-dot"></div></div>',
        iconSize: [22, 22], iconAnchor: [11, 11],
      });
      state.userMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000, interactive: false }).addTo(map);
      if (accuracy && accuracy < 2000) {
        state.accuracyCircle = L.circle([lat, lng], {
          radius: accuracy,
          color: '#1a73e8', weight: 1,
          fillColor: '#1a73e8', fillOpacity: 0.08,
          interactive: false,
        }).addTo(map);
      }
    }

    function clearRouteLine() {
      if (state.routeLine) { map.removeLayer(state.routeLine); state.routeLine = null; }
      if (state.routeTip)  { map.removeLayer(state.routeTip);  state.routeTip = null;  }
    }

    function drawRouteTo(s) {
      clearRouteLine();
      if (!state.userLocation) return;
      const ul = state.userLocation;
      state.routeLine = L.polyline(
        [[ul.lat, ul.lng], [s.lat, s.lng]],
        { color: '#b8373e', weight: 3, opacity: 0.85, dashArray: '6 8', interactive: false }
      ).addTo(map);
      const dist = haversineM(ul.lat, ul.lng, s.lat, s.lng);
      const mid = [(ul.lat + s.lat) / 2, (ul.lng + s.lng) / 2];
      state.routeTip = L.marker(mid, {
        icon: L.divIcon({
          className: 'route-dist-tip',
          html: `<span>${formatDist(dist)}</span>`,
          iconSize: null, iconAnchor: [0, 0],
        }),
        interactive: false, zIndexOffset: 900,
      }).addTo(map);
    }

    function fitToUserAndNearby() {
      if (!state.userLocation) return;
      const filtered = filterSpots();
      const pts = [[state.userLocation.lat, state.userLocation.lng]];
      filtered.slice(0, 10).forEach(s => pts.push([s.lat, s.lng]));
      if (pts.length === 1) {
        map.setView(pts[0], 14);
      } else {
        map.fitBounds(pts, { padding: [60, 60], maxZoom: 14 });
      }
    }

    function enableNearby(loc) {
      state.userLocation = loc;
      state.nearbyActive = true;
      nearMeBtn.classList.add('active');
      radiusPicker.classList.add('on');
      drawUserMarker();
      renderList(); renderMarkers(); updateActiveBar();
      fitToUserAndNearby();
      // ドロワーを半分まで上げて候補を見えるように
      const dr = document.getElementById('drawer');
      dr.classList.remove('snap-peek','snap-full'); dr.classList.add('snap-half');
    }

    function disableNearby() {
      state.nearbyActive = false;
      nearMeBtn.classList.remove('active');
      radiusPicker.classList.remove('on');
      clearRouteLine();
      // マーカー自体は残しても良いが、完全にクリアする
      if (state.userMarker)     { map.removeLayer(state.userMarker);     state.userMarker = null; }
      if (state.accuracyCircle) { map.removeLayer(state.accuracyCircle); state.accuracyCircle = null; }
      state.userLocation = null;
      renderList(); renderMarkers(); updateActiveBar();
    }

    nearMeBtn.addEventListener('click', () => {
      if (state.nearbyActive) {
        disableNearby();
        toast('現在地検索を解除しました');
        return;
      }
      if (!navigator.geolocation) { toast('この端末では位置情報が使えません'); return; }
      nearMeBtn.classList.add('locating');
      toast('現在地を取得中…');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          nearMeBtn.classList.remove('locating');
          const { latitude, longitude, accuracy } = pos.coords;
          enableNearby({ lat: latitude, lng: longitude, accuracy });
          const count = filterSpots().length;
          toast(count > 0 ? `周辺 ${count} 件の神社` : '周辺に神社が見つかりません');
        },
        (err) => {
          nearMeBtn.classList.remove('locating');
          const msg = err && err.code === 1
            ? '位置情報の利用が許可されていません'
            : '位置情報の取得に失敗しました';
          toast(msg);
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
      );
    });

    // 半径ピッカー
    radiusPicker.querySelectorAll('.r-chip').forEach(el => {
      el.addEventListener('click', () => {
        const r = Number(el.dataset.radius);
        state.searchRadius = r;
        radiusPicker.querySelectorAll('.r-chip').forEach(x => x.classList.toggle('active', x === el));
        if (state.nearbyActive) {
          renderList(); renderMarkers(); updateActiveBar(); fitToUserAndNearby();
          const count = filterSpots().length;
          toast(count > 0 ? `${formatDist(r)} 以内 ${count} 件` : `${formatDist(r)} 以内に神社なし`);
        }
      });
    });

    // Submission modal
    const submitOv = document.getElementById('submit-overlay');
    document.getElementById('new-spot-btn').addEventListener('click', () => submitOv.classList.add('on'));
    document.getElementById('submit-close').addEventListener('click', () => submitOv.classList.remove('on'));
    submitOv.addEventListener('click', (e) => { if (e.target === submitOv) submitOv.classList.remove('on'); });
    document.getElementById('submit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        const r = await fetch('/spot-submissions', { method: 'POST', body: fd });
        if (!r.ok) throw new Error('failed');
        toast('申請を受け付けました');
        submitOv.classList.remove('on');
        e.target.reset();
      } catch { toast('申請に失敗しました'); }
    });

    // ========== HELPERS ==========
    function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c])); }
    function escapeAttr(s) { return escapeHtml(s); }

    // ========== INIT ==========
    (async () => {
      await loadFacets();
      await loadSpots();
    })();
  </script>
</body>
</html>
